name: Update README Cards

on:
  schedule:
    - cron: "0 0 * * *" # Runs automatically once daily at midnight
  workflow_dispatch: # Allows you to manually trigger a refresh anytime click a button

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to commit the fresh images back to your repo
    steps:
      - uses: actions/checkout@v4

      # 1. Generates your overall GitHub stats card
      - name: Generate stats card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true&theme=tokyonight
          token: ${{ secrets.GITHUB_TOKEN }}
          path: profile-stats/stats.svg

      # 2. Generates your top languages card
      - name: Generate top languages card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&layout=compact&theme=tokyonight
          token: ${{ secrets.GITHUB_TOKEN }}
          path: profile-stats/top-langs.svg

      # 3. Commits the fresh SVGs back into your repo
      - name: Commit changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile-stats/*.svg
          git diff-index --quiet HEAD || git commit -m "chore: update profile README stats widgets"
          git push
